# Enterprise Rationale: Enforcing a strict, shared lint configuration ensures
# consistent code quality across the data-fetcher service, catches common Go
# pitfalls early (error handling, security, performance), and reduces reviewer
# burden by automating style and correctness checks.
#
# v2 schema (golangci-lint >= 2.0): adds top-level `version: "2"`, moves
# `linters-settings` → `linters.settings`, and restructures exclusions.
# See https://golangci-lint.run/docs/configuration/file/

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Report suspicious constructs
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis (subsumes gosimple in v2)
    - unused        # Find unused declarations
    - gocritic      # Opinionated linting for performance & style
    - gosec         # Security-oriented checks
    - revive        # Drop-in golint replacement with extra rules
    # typecheck: built-in, always run in v2 (cannot be explicitly enabled)
    # gosimple: merged into staticcheck in v2

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Too noisy for most codebases

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

  # v2: 不启用默认 exclusion presets（等价 v1 `issues.exclude-use-default: false`）
  exclusions:
    presets: []

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
