name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Security: gitleaks密钥扫描
  # 企业为何需要：pre-commit可被--no-verify跳过，CI扫描是强制防线
  # 权衡：CI增加约30秒，但阻断密钥泄露的价值远超时间成本
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better detection
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Required (fast) — 每次 push/PR 必须通过
  # RO-037: 拆分为 5 个并行 job（check/lint/depcheck/test:unit/test:property）
  # 企业理由：原串行执行约 4-5 分钟，拆分后最慢的 job 决定总耗时约 1.5-2 分钟。
  # 共享 pnpm store cache + node_modules cache（RO-064），避免每个 job 重复安装。
  # ============================================================
  node-quick:
    name: ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        task:
          - { name: 'Type Check', cmd: 'pnpm run check' }
          - { name: 'Lint', cmd: 'pnpm run lint' }
          - { name: 'Depcheck', cmd: 'pnpm run depcheck' }
          - { name: 'Unit Tests', cmd: 'pnpm run test:unit' }
          - { name: 'Property Tests', cmd: 'pnpm run test:property' }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules (RO-064)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}

  # ============================================================
  # Deep (optional) — 对 main 分支和标签 PR 运行，不 blocking merge
  # ============================================================
  node-deep:
    name: Node Deep (optional)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine@sha256:ef9d151c6fe83308ad8d383c878c5a2a3a75c96cdf8e22b79c1d8a1420a5a4c
        env:
          POSTGRES_USER: backtest
          POSTGRES_PASSWORD: backtest
          POSTGRES_DB: backtest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # Exploratory（非阻断）：bench/coverage 属深度质量门，阈值波动与外部依赖
    # 可能导致边际失败，不阻断合并以便持续观察趋势。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules (RO-064)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high --prod

      - name: License compliance
        run: npx --yes license-checker --production --summary --excludePrivatePackages

      - name: Coverage report with per-file check
        run: pnpm run test:coverage:check

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/vitest/
          retention-days: 7

      - name: Build
        run: pnpm run build

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-fetcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: data-fetcher/go.sum

      - name: Build
        run: go build ./...

      # 企业理由：-race 检测数据竞争。Go 的并发是核心特性，数据竞争在生产环境
      # 会导致难以复现的内存损坏。-race 是 Go 官方竞态检测器，企业 CI 必备。
      # -count=1 禁用测试缓存，确保竞态检测始终运行。
      # 权衡：-race 使测试慢 2-10 倍，但只在 CI 跑，不影响开发体验。
      - name: Test
        run: go test -race -count=1 ./...

      # 企业理由：golangci-lint 汇总多个 linter（errcheck/gosec/staticcheck 等），
      # 在 CI 强制执行代码质量。配置见 data-fetcher/.golangci.yml。
      # 无 CI 强制时，linter 配置形同虚设，PR 不会被拦截。
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: data-fetcher

      # 企业理由：Go 依赖漏洞扫描，govulncheck 是 Go 官方工具。
      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  # ============================================================
  # Go 引擎服务 CI（T-ARCH-2.5）
  # ============================================================
  # 企业理由：engine-go 是平台唯一的计算引擎（ADR-008，Rust 已退役），
  # 需要独立的 CI 流水线确保代码质量。与 data-fetcher 分离是因为
  # 两者 Go 版本、依赖、工作目录均不同，合并会增加维护复杂度。
  go-engine:
    name: Go Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: engine-go/go.sum

      - name: Build
        run: go build ./...

      # 企业理由：-race 检测数据竞争。Go 引擎涉及并发计算（蒙特卡洛模拟），
      # 数据竞争在生产环境会导致难以复现的内存损坏。-race 是 Go 官方竞态检测器。
      # -count=1 禁用测试缓存，确保竞态检测始终运行。
      - name: Test
        run: go test -race -count=1 ./...

      # 企业理由：go vet 检测常见错误（printf 参数不匹配、未使用的变量等），
      # 是 Go 官方静态分析工具，CI 必备。
      - name: Vet
        run: go vet ./...

      # 企业理由：golangci-lint 汇总多个 linter（errcheck/gosec/staticcheck 等），
      # 在 CI 强制执行代码质量。配置见 engine-go/.golangci.yml。
      # 与 data-fetcher 分离是因为两者 Go 版本、工作目录均不同。
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: engine-go

      # 企业理由：Go 依赖漏洞扫描，govulncheck 是 Go 官方工具。
      # engine-go 是新迁移引擎（ADR-008），涉及蒙特卡洛并发计算，
      # 漏洞扫描是 CI 安全基线。
      # 权衡：CI 增加 1-2 分钟，换取安全拦截。
      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  integration:
    name: Integration Tests (optional)
    # Exploratory（非阻断）：集成测试依赖真实 Postgres，CI 环境偶发波动
    # 不阻断合并以避免误拦有效 PR。
    continue-on-error: true
    runs-on: ubuntu-latest
    services:
      postgres:
        # T-40：与 docker-compose 对齐 digest pin
        image: postgres:16-alpine@sha256:ef9d151c6fe83308ad8d383c878c5a2a3a75c96cdf8e22b79c1d8a1420a5a4c
        env:
          POSTGRES_USER: backtest
          POSTGRES_PASSWORD: backtest
          POSTGRES_DB: backtest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules (RO-064)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm run test:integration
        env:
          DATABASE_URL: postgresql://backtest:backtest@localhost:5432/backtest_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          RUN_TESTCONTAINERS: '1'

  contract:
    name: Contract Tests (optional)
    # Exploratory（非阻断）：契约测试可能因外部 API 演进而暂时性失败，
    # 不阻断合并以便独立追踪外部破坏。
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:contract

  # ============================================================
  # 跨平台确定性验证（P3.2）：同一输入在不同架构上产生相同指纹
  # ============================================================
  determinism:
    name: Cross-platform Determinism (optional)
    runs-on: ubuntu-latest
    # Exploratory（非阻断）：跨架构确定性为探索性验证，
    # 失败可能源于 Go runtime 而非业务 bug，不阻断合并。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: engine-go/go.sum

      - name: Build for amd64
        run: cd engine-go && GOARCH=amd64 go build -o /tmp/engine-amd64 ./cmd/

      - name: Build for 386
        run: cd engine-go && GOARCH=386 go build -o /tmp/engine-386 ./cmd/

      - name: Generate fingerprints
        run: |
          echo '{"portfolios":[{"name":"test","assets":[{"ticker":"SPY","weight":60},{"ticker":"BND","weight":40}],"rebalanceFrequency":"quarterly"}],"priceData":{"SPY":{"2024-01-02":180,"2024-01-03":181},"BND":{"2024-01-02":80,"2024-01-03":79.9}},"params":{"startDate":"2024-01-02","endDate":"2024-01-03","startingValue":10000,"adjustForInflation":false,"rollingWindowMonths":12,"benchmarkTicker":""},"fingerprint":true}' > /tmp/test-input.json

          FP_AMD64=$(/tmp/engine-amd64 backtest --input /tmp/test-input.json 2>/dev/null | sha256sum | cut -d' ' -f1)
          FP_386=$(/tmp/engine-386 backtest --input /tmp/test-input.json 2>/dev/null | sha256sum | cut -d' ' -f1)

          echo "amd64 fingerprint: $FP_AMD64"
          echo "386 fingerprint: $FP_386"

          if [ "$FP_AMD64" != "$FP_386" ]; then
            echo "❌ Fingerprint mismatch between amd64 and 386"
            exit 1
          fi
          echo "✅ Determinism check passed"

  # ============================================================
  # Should-gate（阻断合并）：E2E 覆盖用户真实流程（导入 → 回测 → 查看结果），
  # 失败意味着用户无法完成核心操作。测试基础设施已修复（RO-004/005），
  # 稳定状态下可通过。
  # ============================================================
  e2e:
    name: E2E Tests (Playwright) (required)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules (RO-064)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dependency stack
        run: docker compose up -d postgres redis engine-go data-fetcher

      - name: Wait for Postgres and Go services
        run: |
          npx wait-on tcp:127.0.0.1:5432 --timeout 120000
          npx wait-on http://127.0.0.1:5004/api/engine/health --timeout 120000
          npx wait-on http://127.0.0.1:5003/api/data/health --timeout 120000

      - name: Run E2E tests
        run: pnpm run test:e2e:ui
        env:
          CI: 'true'
          DATABASE_URL: postgresql://backtest:backtest@localhost:5432/backtest
          COMPUTE_RATE_LIMIT_MAX: '200'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  # 企业理由：迁移 down 函数从未测试，生产回滚可能锁死。
  # CI 中验证 initSchema→rollbackSchema(0)→initSchema 循环，
  # 确保迁移可安全回滚。
  # Should-gate（阻断合并）：回滚安全是生产运维基线，不可回滚的迁移
  # 会导致生产锁死，必须阻断合并。
  migration-rollback:
    name: Migration Rollback Test (required)
    runs-on: ubuntu-latest
    services:
      postgres:
        # T-40：与 docker-compose 对齐 digest pin
        image: postgres:16-alpine@sha256:ef9d151c6fe83308ad8d383c878c5a2a3a75c96cdf8e22b79c1d8a1420a5a4c
        env:
          POSTGRES_USER: backtest
          POSTGRES_PASSWORD: backtest
          POSTGRES_DB: backtest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules (RO-064)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test migration up→down→up cycle
        run: |
          node -e "
            const { initSchema, rollbackSchema, closeDb } = require('./dist/db/pool.js');
            async function test() {
              console.log('Step 1: initSchema (up)');
              await initSchema();
              console.log('Step 2: rollbackSchema(0) (down)');
              await rollbackSchema(0);
              console.log('Step 3: initSchema again (up)');
              await initSchema();
              console.log('Migration rollback test PASSED');
              await closeDb();
            }
            test().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          DATABASE_URL: postgresql://backtest:backtest@localhost:5432/backtest_test

  # ============================================================
  # Docker 镜像构建 + Trivy 安全扫描（T-P1-4）
  # ============================================================
  # 企业理由：Shift-left security 要求在 CI 阶段扫描镜像漏洞，而非上线后。
  # 镜像 tag 为 git SHA 保证可追溯（latest 是反模式：无法定位是哪次构建）。
  # Trivy 扫描 HIGH/CRITICAL 漏洞并阻断 CI，防止带漏洞镜像进入生产。
  # 权衡：CI 增加 3-5 分钟，换取供应链安全。
  docker:
    name: Docker Build & Security Scan (optional)
    # Exploratory（非阻断）：镜像构建+Trivy 扫描较重，外部基础镜像漏洞
    # 不应阻断业务 PR 合并，由 nightly 流水线跟进。
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 企业理由：使用 BuildKit 加速构建，支持多阶段构建缓存
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 企业理由：tag 为 git SHA 保证可追溯。
      # latest 标签无法区分构建版本，回滚和审计困难。
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Node API image
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          tags: ghcr.io/${{ github.repository_owner }}/backtest-api:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Go data-fetcher image
        id: build-data-fetcher
        uses: docker/build-push-action@v6
        with:
          context: ./data-fetcher
          file: ./data-fetcher/Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/data-fetcher:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Go engine image
        id: build-engine-go
        uses: docker/build-push-action@v6
        with:
          context: ./engine-go
          file: ./engine-go/Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/engine-go:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 企业理由：Trivy 是 CNCF 毕业项目，容器漏洞扫描行业标准。
      # --severity HIGH,CRITICAL 只关注高危漏洞，避免 LOW/MEDIUM 噪音。
      # --exit-code 1 使高危漏洞阻断 CI（shift-left security）。
      # --ignore-unfixed 只报告已有修复方案的漏洞，减少无法处理的告警。
      - name: Trivy scan Node API
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/backtest-api:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Trivy scan Go data-fetcher
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/data-fetcher:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Trivy scan Go engine
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/engine-go:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      # Supply Chain (ADR-012): 为全部 3 个镜像生成 SBOM（CycloneDX）。
      # 企业为何需要：EO 14028 / EU CRA 要求软件供应链透明度；SBOM 是漏洞响应（"我是否受某 CVE 影响"）
      # 与 license 审计的事实依据。此前仅对 backtest-api 生成且未上传为制品，覆盖不全。
      # 权衡：CI 增加约 1-2 分钟，换取全栈供应链可见性。
      - name: Generate SBOM (Node API)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/backtest-api:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-backtest-api.json
      - name: Generate SBOM (data-fetcher)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/data-fetcher:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-data-fetcher.json
      - name: Generate SBOM (engine-go)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/engine-go:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-engine-go.json

      # Supply Chain (T-08): 上传 SBOM 为构建制品，使其可被下游审计/漏洞工具消费。
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-*.json
          retention-days: 30

      # Supply Chain (ADR-012 / SLSA): 为构建产物生成 keyless 出处证明（Provenance）。
      # 企业为何需要：SLSA Provenance 证明"产物由可信流水线构建、未被篡改"，是 SLSA L2+ 的核心要求。
      # 使用 GitHub OIDC + Sigstore（无需托管私钥）。
      - name: Attest build provenance for SBOMs
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'sbom-*.json'

      # T-35：容器镜像 SLSA provenance（digest 级，与 SBOM 证明互补）
      - name: Attest container provenance (backtest-api)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: backtest-api
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: false
      - name: Attest container provenance (data-fetcher)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: data-fetcher
          subject-digest: ${{ steps.build-data-fetcher.outputs.digest }}
          push-to-registry: false
      - name: Attest container provenance (engine-go)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: engine-go
          subject-digest: ${{ steps.build-engine-go.outputs.digest }}
          push-to-registry: false

      # Supply Chain: 容器镜像 keyless 签名（cosign / Sigstore）。
      # 企业为何需要：未签名镜像可被替换为恶意镜像。keyless 模式用 OIDC 短期证书，
      # 免去托管/轮换 COSIGN_PRIVATE_KEY 的运维与泄露风险。
      # 注：当前 CI 仅 load 镜像未 push 到 registry，签名在引入镜像仓库推送后对全部 3 镜像启用。
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign container images (keyless, T-D1)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/backtest-api:${{ github.sha }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/data-fetcher:${{ github.sha }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/engine-go:${{ github.sha }}

  # T-20：混沌实验（需 Docker；失败不阻断主 CI）
  chaos:
    name: Chaos Tests
    runs-on: ubuntu-latest
    # Exploratory（非阻断）：混沌实验天生非确定性（T-20），
    # 失败不阻断合并，仅用于揭示韧性缺陷。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules (RO-064)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Chaos tests 需要 docker compose 全栈运行（postgres + redis + engine-go + api）
      # 才能对 API (127.0.0.1:5001) 发起网络分区 / 重启实验
      - name: Build backend API image
        run: docker build -f Dockerfile.backend -t backtest-api:chaos .

      - name: Build engine-go image
        run: docker build -f engine-go/Dockerfile -t backtest-engine-go:chaos engine-go/

      - name: Start full application stack
        run: docker compose up -d postgres redis engine-go api

      - name: Wait for stack readiness
        run: |
          npx wait-on tcp:127.0.0.1:5432 --timeout 120000
          npx wait-on tcp:127.0.0.1:6379 --timeout 120000
          npx wait-on http://127.0.0.1:5001/api/health --timeout 180000
          npx wait-on http://127.0.0.1:5004/api/engine/health --timeout 120000

      - name: Run chaos tests
        run: pnpm run test:chaos
        env:
          NODE_ENV: test
          RUN_TESTCONTAINERS: '1'
          API_URL: http://127.0.0.1:5001
