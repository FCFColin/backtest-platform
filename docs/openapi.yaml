                    $ref: '#/components/schemas/BacktestRun'
        '404':
          description: 回测历史不存在或不属于当前租户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    delete:
      tags: [saas-runs]
      summary: 删除回测历史
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
        '401':
          description: 未携带或携带无效 JWT,需先登录获取 Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户不属于该回测历史的租户,RLS 拒绝访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: 回测历史不存在或不属于当前租户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务端内部错误(如数据库不可达)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean

  # ----- /orgs：组织与成员管理、邀请（ADR-035）-----
  /orgs/current:
    get:
      tags: [saas-orgs]
      summary: 获取当前组织信息
      description: 返回当前活跃组织的名称、slug、计划与状态。任意成员可见。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 组织信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/OrgInfo'
        '404':
          description: 组织不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    patch:
      tags: [saas-orgs]
      summary: 更新组织名称
      description: 更新当前组织显示名。需 ADMIN_ACCESS 权限（owner/admin）。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      updated:
                        type: boolean
        '400':
          description: 请求体格式错误或 name 校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: 未认证或令牌失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户无 ADMIN_ACCESS 权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /orgs/members:
    get:
      tags: [saas-orgs]
      summary: 列出组织成员
      description: 返回当前组织全部成员（含用户名、邮箱、角色）。任意成员可见。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrgMember'
        '401':
          description: 未认证或令牌失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户不属于任何组织
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /orgs/members/{userId}:
    patch:
      tags: [saas-orgs]
      summary: 修改成员角色
      description: |
        修改指定成员在组织内的角色。需 ADMIN_ACCESS 权限。
        拒绝降级组织内最后一个 owner（返回 409 LAST_OWNER）。
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum: [owner, admin, analyst, readonly]
      responses:
        '200':
          description: 角色更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      updated:
                        type: boolean
        '404':
          description: 成员不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: 不能降级组织唯一的 owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    delete:
      tags: [saas-orgs]
      summary: 移除组织成员
      description: |
        从组织中移除指定成员。需 ADMIN_ACCESS 权限。
        拒绝移除最后一个 owner（返回 409 LAST_OWNER）。
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 移除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      removed:
                        type: boolean
        '409':
          description: 不能移除组织唯一的 owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /orgs/invitations:
    get:
      tags: [saas-orgs]
      summary: 列出组织邀请
      description: 返回当前组织的全部邀请（含待处理与已接受）。需 ADMIN_ACCESS 权限。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 邀请列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invitation'
        '401':
          description: 未认证或令牌失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户无 ADMIN_ACCESS 权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    post:
      tags: [saas-orgs]
      summary: 创建组织邀请
      description: |
        为指定邮箱创建组织邀请并尝试发送邀请邮件。需 ADMIN_ACCESS 权限。
        邀请令牌仅存哈希、7 天有效、可吊销。邮件发送失败不影响邀请创建。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
      responses:
        '201':
          description: 邀请创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                      role:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
        '400':
          description: 请求体格式错误或 role 非法（不能邀请为 owner）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: 未认证或令牌失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户无 ADMIN_ACCESS 权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务器内部错误（邮件发送失败不影响邀请创建）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /orgs/invitations/accept:
    post:
      tags: [saas-orgs]
      summary: 接受组织邀请
      description: |
        凭邀请令牌接受邀请，为当前用户在目标组织内建立成员关系。
        仅需登录认证（受邀者尚未属于该组织，不要求活跃租户）。
        令牌无效/过期/已被接受时返回 400。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '200':
          description: 接受成功，返回组织 ID 与角色
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      orgId:
                        type: string
                        format: uuid
                      role:
                        type: string
        '400':
          description: 邀请无效、已过期或已被接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /orgs/invitations/{id}:
    delete:
      tags: [saas-orgs]
      summary: 撤销组织邀请
      description: 撤销未接受的邀请。需 ADMIN_ACCESS 权限。
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 撤销成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      revoked:
                        type: boolean
        '404':
          description: 邀请不存在或已被接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  # ----- /billing：Stripe 计费（ADR-036）-----
  /billing/subscription:
    get:
      tags: [saas-billing]
      summary: 获取当前组织订阅摘要
      description: |
        返回计费启用状态、Stripe publishable key 与当前组织订阅摘要。
        任意成员可见。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 订阅摘要
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BillingSubscriptionResponse'
        '401':
          description: 未认证或令牌失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户不属于任何组织
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务器内部错误或 Stripe API 异常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /billing/checkout:
    post:
      tags: [saas-billing]
      summary: 创建订阅 Checkout 会话
      description: |
        为指定计划创建 Stripe Checkout 会话，返回跳转 URL。
        需 ADMIN_ACCESS 权限。计费未启用时返回 503 BILLING_DISABLED。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Checkout 会话创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BillingUrlResponse'
        '503':
          description: 计费功能未启用或价格未配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /billing/portal:
    post:
      tags: [saas-billing]
      summary: 创建 Billing Portal 会话
      description: |
        为当前组织创建 Stripe Billing Portal 会话，返回跳转 URL。
        需 ADMIN_ACCESS 权限。组织尚无 Stripe customer 时返回 404。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Portal 会话创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BillingUrlResponse'
        '404':
          description: 该组织尚无计费账户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '503':
          description: 计费功能未启用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  # ----- /jobs：异步任务状态查询（ADR-019 所有权隔离）-----
  /jobs/{id}:
    get:
      tags: [saas-jobs]
      summary: 查询异步任务状态与结果
      description: |
        查询指定异步任务（优化器/网格搜索）的状态与结果。

        安全（ADR-019 IDOR 防护）：仅任务提交者本人或 admin 可读取；
        缺少 owner 信息的历史/匿名任务对非 admin 一律视为不可见，返回 404
        （不泄露任务是否存在）。跨租户访问同样返回 404。
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 任务 ID（BullMQ jobId）
      responses:
        '200':
          description: 任务状态与结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/JobStatus'
        '404':
          description: 任务不存在或请求方无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
