      summary: 全量更新
      description: |
        触发数据引擎全量更新，替换所有数据。

        **HTTP 方法语义**：全量更新语义为"替换所有数据"，
        符合 PUT 的完整替换语义（RFC 9110 §9.6.3）。
        PUT 天然幂等——重复调用不会产生不同结果，
        客户端可安全重试，中间代理可缓存 PUT 响应。
      security:
        - ApiKeyAuth: []
      responses:
        '202':
          description: 触发成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '500':
          description: 触发失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [data-manage]
      summary: '（已废弃）全量更新'
      deprecated: true
      description: |
        **已废弃**，请使用 PUT /data/manage/update/full 替代。

        此端点将在 Sunset 日期后移除。迁移期间仍可使用，
        但响应将包含 Deprecation 和 Sunset 头。

        废弃原因：全量更新语义为"替换所有数据"，应使用 PUT 方法
        而非 POST，以符合 RESTful 幂等语义（RFC 9110 §9.6.3）。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 触发成功（已废弃）
          headers:
            Deprecation:
              schema:
                type: string
                enum: ['true']
              description: 'RFC 8594 - 此端点已废弃'
            Sunset:
              schema:
                type: string
                format: date
              description: 'RFC 8594 - 此端点将被移除的日期'
            Link:
              schema:
                type: string
              description: '指向替代端点，格式: </api/v1/data/manage/update/full>; rel="successor-version"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '500':
          description: 触发失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

