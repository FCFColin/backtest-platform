  /tactical-grid/search:
    post:
      tags: [tactical-grid]
      summary: 战术网格搜索
      description: |
        遍历参数网格（笛卡尔积），对每个参数组合计算信号并运行回测，
        按优化目标排序返回 Top N 结果与热力图数据矩阵。
