      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TacticalGridRequest'
      responses:
        '200':
          description: 网格搜索结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalCombinations:
                        type: number
                      allMetrics:
                        type: array
                        items:
                          type: object
                          properties:
                            param1:
                              type: number
                            param2:
                              type: number
                            cagr:
                              type: number
                            maxDrawdown:
                              type: number
                            sharpe:
                              type: number
                            totalReturn:
                              type: number
                            stdev:
                              type: number
                            calmar:
                              type: number
                      topResults:
                        type: array
                        items:
                          type: object
                          properties:
                            param1:
                              type: number
                            param2:
                              type: number
                            cagr:
                              type: number
                            maxDrawdown:
                              type: number
                            sharpe:
                              type: number
                            totalReturn:
                              type: number
                            stdev:
                              type: number
                            calmar:
                              type: number
                            growthCurve:
                              type: array
                              items:
                                type: object
                                properties:
                                  date:
                                    type: string
                                  value:
                                    type: number
                      heatmap:
                        type: object
                        properties:
                          param1Label:
                            type: string
                          param2Label:
                            type: string
                          param1Values:
                            type: array
                            items:
                              type: number
                          param2Values:
                            type: array
                            items:
                              type: number
                          matrix:
                            type: array
                            items:
                              type: array
                              items:
                                type: number
                                nullable: true
                          objective:
                            type: string
                      bestCombination:
                        type: object
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 网格搜索运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== PCA =====
  /pca/analyze:
    post:
      tags: [pca]
      summary: 主成分分析
      description: |
        对多个资产的收益率序列进行主成分分析。
        使用 Jacobi 方法进行特征值分解，返回特征值、载荷矩阵、得分矩阵与累计方差解释率。
        至少需要 2 个资产。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PCARequest'
      responses:
        '200':
          description: PCA 分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PCAResult'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: PCA 分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 信号分析 =====
  /signal/analyze:
    post:
      tags: [signal]
      summary: 单信号分析
      description: |
        对单个资产运行技术指标信号分析，生成买卖信号点、统计指标和权益曲线。
        支持指标：SMA、EMA、RSI、MACD、Bollinger。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalAnalysisRequest'
      responses:
        '200':
          description: 信号分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SignalAnalysisResult'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 未找到价格数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 信号分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /signal/dual:
    post:
      tags: [signal]
      summary: 双信号分析
      description: |
        对两个信号进行组合分析，支持 AND/OR/XOR 组合方式。
        返回各信号独立结果、组合结果和逐日对比。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DualSignalConfig'
      responses:
        '200':
          description: 双信号分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      signal1:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      signal2:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      combined:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      comparison:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            signal1:
                              type: string
                              enum: [buy, sell]
                              nullable: true
                            signal2:
                              type: string
                              enum: [buy, sell]
                              nullable: true
                            combined:
                              type: string
                              enum: [buy, sell]
                              nullable: true
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 未找到价格数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 双信号分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /signal/multi:
    post:
      tags: [signal]
      summary: 多信号分析
      description: |
        对多个信号进行聚合分析，支持加权平均、投票、排名三种聚合方式。
        各信号共享同一 ticker 与时间范围。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiSignalConfig'
      responses:
        '200':
          description: 多信号分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      aggregated:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      contributions:
                        type: array
                        items:
                          type: object
                          properties:
                            index:
                              type: number
                            indicator:
                              type: string
                            contribution:
                              type: number
                            statistics:
                              type: object
                              properties:
                                totalSignals:
                                  type: number
                                winRate:
                                  type: number
                                avgReturn:
                                  type: number
                                maxDrawdown:
                                  type: number
                                sharpe:
                                  type: number
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 未找到价格数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 多信号分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== LETF =====
  /letf/analyze:
    post:
      tags: [letf]
      summary: 杠杆 ETF 滑点分析
      description: |
        分析杠杆 ETF 相对基准指数的滑点拖累。
        计算累积滑点、年化拖累、实际杠杆等指标。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LETFRequest'
      responses:
        '200':
          description: LETF 滑点分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LETFResult'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 目标优化 =====
  /goal-optimizer/optimize:
    post:
      tags: [goal-optimizer]
      summary: 目标优化
      description: |
        运行蒙特卡洛模拟，计算达成财务目标的概率与建议配置。
        基于资产历史收益率统计生成模拟路径，支持最大回撤和波动率约束。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalOptimizerRequest'
      responses:
        '200':
          description: 目标优化结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/GoalOptimizerResult'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 优化失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 回测优化器 =====
  /backtest-optimizer/optimize:
    post:
      tags: [backtest-optimizer]
      summary: 回测参数优化
      description: |
        遍历参数空间（再平衡频率 × 阈值 × 初始资金）运行组合回测，
        按优化目标排序返回全部结果及最优组合的收益曲线。
        参数组合上限 1000。
      security:
        - ApiKeyAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestOptimizerRequest'
      responses:
        '200':
          description: 优化结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            rebalanceFrequency:
                              type: string
                            rebalanceThreshold:
                              type: number
                            initialCapital:
                              type: number
                            cagr:
                              type: number
                            maxDrawdown:
                              type: number
                            sharpe:
                              type: number
                            sortino:
                              type: number
                            stdev:
                              type: number
                            calmar:
                              type: number
                      best:
                        type: object
                        nullable: true
                        description: 最优组合（含收益曲线）
                      benchmarkGrowth:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            value:
                              type: number
                      totalCombinations:
                        type: number
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 优化运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
