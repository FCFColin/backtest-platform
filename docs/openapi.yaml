      summary: '（已废弃）恢复中断'
      deprecated: true
      description: |
        **已废弃**，请使用 PATCH /data/manage/resume 替代。

        此端点将在 Sunset 日期后移除。迁移期间仍可使用，
        但响应将包含 Deprecation 和 Sunset 头。

        废弃原因：resume 语义为"部分修改任务状态"，应使用 PATCH 方法
        而非 POST，以符合 RESTful 部分更新语义（RFC 5789）。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 恢复成功（已废弃）
          headers:
            Deprecation:
              schema:
                type: string
                enum: ['true']
              description: 'RFC 8594 - 此端点已废弃'
            Sunset:
              schema:
                type: string
                format: date
              description: 'RFC 8594 - 此端点将被移除的日期'
            Link:
              schema:
                type: string
              description: '指向替代端点，格式: </api/v1/data/manage/resume>; rel="successor-version"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '500':
          description: 恢复失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data/manage/universe:
    put:
      tags: [data-manage]
      summary: 刷新宇宙
      description: |
        刷新投资宇宙列表，完整替换现有宇宙数据。

        **HTTP 方法语义**：universe refresh 语义为"完整替换投资宇宙列表"，
        符合 PUT 的完整替换语义（RFC 9110 §9.6.3）。幂等——重复刷新产生相同的宇宙集合。
      security:
        - ApiKeyAuth: []
      responses:
        '202':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '500':
          description: 刷新失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [data-manage]
      summary: '（已废弃）刷新宇宙'
      deprecated: true
      description: |
        **已废弃**，请使用 PUT /data/manage/universe 替代。

        此端点将在 Sunset 日期后移除。迁移期间仍可使用，
        但响应将包含 Deprecation 和 Sunset 头。

        废弃原因：universe refresh 语义为"完整替换宇宙列表"，应使用 PUT 方法
        而非 POST，以符合 RESTful 幂等语义（RFC 9110 §9.6.3）。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 刷新成功（已废弃）
          headers:
            Deprecation:
              schema:
                type: string
                enum: ['true']
              description: 'RFC 8594 - 此端点已废弃'
            Sunset:
              schema:
                type: string
                format: date
              description: 'RFC 8594 - 此端点将被移除的日期'
            Link:
              schema:
                type: string
              description: '指向替代端点，格式: </api/v1/data/manage/universe>; rel="successor-version"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '500':
          description: 刷新失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data/manage/ticker/{id}:
    get:
      tags: [data-manage]
      summary: 获取单个标的数据
      description: 获取指定标的的详细数据
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Z0-9._-]{1,20}$'
          description: 标的代码
      responses:
        '200':
          description: 标的数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '400':
          description: ticker 参数格式非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 标的不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 获取数据失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data/manage/regenerate-meta:
    put:
      tags: [data-manage]
      summary: 重新生成元数据文件
      description: |
        重新生成所有标的的元数据文件，完整替换现有元数据。

        **HTTP 方法语义**：regenerate-meta 语义为"完整替换所有元数据文件"，
        符合 PUT 的完整替换语义（RFC 9110 §9.6.3）。幂等——重复生成产生相同的元数据文件。
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '500':
          description: 生成失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [data-manage]
      summary: '（已废弃）重新生成元数据文件'
      deprecated: true
      description: |
        **已废弃**，请使用 PUT /data/manage/regenerate-meta 替代。

        此端点将在 Sunset 日期后移除。迁移期间仍可使用，
        但响应将包含 Deprecation 和 Sunset 头。

        废弃原因：regenerate-meta 语义为"完整替换元数据文件"，应使用 PUT 方法
        而非 POST，以符合 RESTful 幂等语义（RFC 9110 §9.6.3）。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 生成成功（已废弃）
          headers:
            Deprecation:
              schema:
                type: string
                enum: ['true']
              description: 'RFC 8594 - 此端点已废弃'
            Sunset:
              schema:
                type: string
                format: date
              description: 'RFC 8594 - 此端点将被移除的日期'
            Link:
              schema:
                type: string
              description: '指向替代端点，格式: </api/v1/data/manage/regenerate-meta>; rel="successor-version"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '500':
          description: 生成失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 管理后台 =====
  /admin/stats:
    get:
      tags: [admin]
      summary: 仪表盘统计数据
      description: 返回服务健康状态、数据统计、系统信息等仪表盘数据
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 仪表盘数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      services:
                        type: object
                        properties:
                          go_engine:
                            type: object
                            properties:
                              status:
                                type: string
                                enum: [healthy, unhealthy]
                              latency_ms:
                                type: number
                              version:
                                type: string
                              error:
                                type: string
                          go_data_service:
                            type: object
                            properties:
                              status:
                                type: string
                                enum: [healthy, unhealthy]
                              latency_ms:
                                type: number
                              version:
                                type: string
                              error:
                                type: string
                      data_stats:
                        type: object
                      system:
                        type: object
                        properties:
                          memory:
                            type: object
                            properties:
                              rss_mb:
                                type: number
                              heap_used_mb:
                                type: number
                              heap_total_mb:
                                type: number
                              external_mb:
                                type: number
                          uptime_seconds:
                            type: number
                          uptime_formatted:
                            type: string
                      backtest_history:
                        type: array
                        items:
                          type: object
        '500':
          description: 获取统计数据失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/system:
    get:
      tags: [admin]
      summary: 系统资源信息
      description: 返回系统内存使用、运行时间、数据目录信息
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 系统信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      memory:
                        type: object
                        properties:
                          rss:
                            type: number
                          heap_total:
                            type: number
                          heap_used:
                            type: number
                          external:
                            type: number
                          array_buffers:
                            type: number
                          rss_mb:
                            type: number
                          heap_used_mb:
                            type: number
                          heap_total_mb:
                            type: number
                      uptime:
                        type: object
                        properties:
                          seconds:
                            type: number
                          formatted:
                            type: string
                      data_directory:
                        type: object
                        properties:
                          total_size_mb:
                            type: number
                          ticker_file_count:
                            type: number
                          total_data_points:
                            type: number
        '500':
          description: 获取系统信息失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 健康检查 =====
  /health:
    get:
      tags: [health]
      summary: 轻量存活探针
      description: 确认 API 进程可响应，不暴露依赖拓扑（K8s liveness）
      security: []
      responses:
        '200':
          description: 存活状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [ok]
                      timestamp:
                        type: string
                        format: date-time

  /ready:
    get:
      tags: [health]
      summary: 深度就绪检查
      description: 探测引擎、数据库、Redis 等依赖；配置 METRICS_AUTH_TOKEN 时需 Bearer 鉴权
      security: []
      responses:
        '200':
          description: 就绪或降级
        '401':
          description: 未授权（已配置 METRICS_AUTH_TOKEN 时）
        '503':
          description: 核心依赖不可用

  /metrics:
    get:
      tags: [health]
      summary: Prometheus 指标端点
      description: 返回 Prometheus 格式的监控指标
      security: []
      responses:
        '200':
          description: Prometheus text format 指标
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
        '500':
          description: 指标生成失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 战术分配 =====
  /tactical/backtest:
    post:
      tags: [tactical]
      summary: 运行战术分配回测
      description: |
        接收战术策略配置，计算信号并运行动态权重回测。
        同时运行等权基准回测作为对比。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - strategy
                - startDate
                - endDate
                - startingValue
                - rebalanceFrequency
              properties:
                strategy:
                  $ref: '#/components/schemas/TacticalStrategy'
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                startingValue:
                  type: number
                rebalanceFrequency:
                  type: string
                  enum: [daily, weekly, monthly, quarterly, annual, none]
      responses:
        '200':
          description: 战术回测结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      portfolio:
                        $ref: '#/components/schemas/PortfolioResult'
                      benchmark:
                        $ref: '#/components/schemas/PortfolioResult'
                      signalHistory:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            activeSignals:
                              type: array
                              items:
                                type: string
                            weights:
                              type: array
                              items:
                                type: object
                                properties:
                                  ticker:
                                    type: string
                                  weight:
                                    type: number
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 回测运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tactical/what-if:
    post:
      tags: [tactical]
      summary: 实时价格查询与信号状态
      description: 接收 ticker 列表，返回实时价格与当前信号状态
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tickers
                - strategy
              properties:
                tickers:
                  type: array
                  items:
                    type: string
                  minItems: 1
                strategy:
                  $ref: '#/components/schemas/TacticalStrategy'
                endDate:
                  type: string
                  format: date
                  description: 可选，默认当天
      responses:
        '200':
          description: 实时信号状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                        currentPrice:
                          type: number
                        signalDate:
                          type: string
                        signalType:
                          type: string
                          enum: [buy, sell, hold]
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 查询失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tactical/alerts:
    post:
      tags: [tactical]
      summary: 保存邮件告警配置
      description: 保存邮件告警配置（内存暂存，进程重启后丢失）
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - config
              properties:
                config:
                  $ref: '#/components/schemas/EmailAlertConfig'
      responses:
        '200':
          description: 保存成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      saved:
                        type: boolean
                      config:
                        $ref: '#/components/schemas/EmailAlertConfig'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 保存失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 战术网格搜索 =====
  /tactical-grid/search:
    post:
      tags: [tactical-grid]
      summary: 战术网格搜索
      description: |
        遍历参数网格（笛卡尔积），对每个参数组合计算信号并运行回测，
        按优化目标排序返回 Top N 结果与热力图数据矩阵。
        参数组合上限 200。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TacticalGridRequest'
      responses:
        '200':
          description: 网格搜索结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalCombinations:
                        type: number
                      allMetrics:
                        type: array
                        items:
                          type: object
                          properties:
                            param1:
                              type: number
                            param2:
                              type: number
                            cagr:
                              type: number
                            maxDrawdown:
                              type: number
                            sharpe:
                              type: number
                            totalReturn:
                              type: number
                            stdev:
                              type: number
                            calmar:
                              type: number
                      topResults:
                        type: array
                        items:
                          type: object
                          properties:
                            param1:
                              type: number
                            param2:
                              type: number
                            cagr:
                              type: number
                            maxDrawdown:
                              type: number
                            sharpe:
                              type: number
                            totalReturn:
                              type: number
                            stdev:
                              type: number
                            calmar:
                              type: number
                            growthCurve:
                              type: array
                              items:
                                type: object
                                properties:
                                  date:
                                    type: string
                                  value:
                                    type: number
                      heatmap:
                        type: object
                        properties:
                          param1Label:
                            type: string
                          param2Label:
                            type: string
                          param1Values:
                            type: array
                            items:
                              type: number
                          param2Values:
                            type: array
                            items:
                              type: number
                          matrix:
                            type: array
                            items:
                              type: array
                              items:
                                type: number
                                nullable: true
                          objective:
                            type: string
                      bestCombination:
                        type: object
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 网格搜索运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== PCA =====
  /pca/analyze:
    post:
      tags: [pca]
      summary: 主成分分析
      description: |
        对多个资产的收益率序列进行主成分分析。
        使用 Jacobi 方法进行特征值分解，返回特征值、载荷矩阵、得分矩阵与累计方差解释率。
        至少需要 2 个资产。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PCARequest'
      responses:
        '200':
          description: PCA 分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PCAResult'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: PCA 分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 信号分析 =====
  /signal/analyze:
    post:
      tags: [signal]
      summary: 单信号分析
      description: |
        对单个资产运行技术指标信号分析，生成买卖信号点、统计指标和权益曲线。
        支持指标：SMA、EMA、RSI、MACD、Bollinger。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalAnalysisRequest'
      responses:
        '200':
          description: 信号分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SignalAnalysisResult'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 未找到价格数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 信号分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /signal/dual:
    post:
      tags: [signal]
      summary: 双信号分析
      description: |
        对两个信号进行组合分析，支持 AND/OR/XOR 组合方式。
        返回各信号独立结果、组合结果和逐日对比。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DualSignalConfig'
      responses:
        '200':
          description: 双信号分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      signal1:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      signal2:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      combined:
                        $ref: '#/components/schemas/SignalAnalysisResult'
                      comparison:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            signal1:
                              type: string
                              enum: [buy, sell]
                              nullable: true
                            signal2:
                              type: string
                              enum: [buy, sell]
                              nullable: true
                            combined:
                              type: string
                              enum: [buy, sell]
                              nullable: true
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 未找到价格数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 双信号分析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /signal/multi:
    post:
      tags: [signal]
      summary: 多信号分析
      description: |
        对多个信号进行聚合分析，支持加权平均、投票、排名三种聚合方式。
        各信号共享同一 ticker 与时间范围。
      requestBody:
        required: true
