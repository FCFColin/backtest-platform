        '500':
          description: 优化失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 回测优化器 =====
  /backtest-optimizer/optimize:
    post:
      tags: [backtest-optimizer]
      summary: 回测参数优化
      description: |
        遍历参数空间（再平衡频率 × 阈值 × 初始资金）运行组合回测，
        按优化目标排序返回全部结果及最优组合的收益曲线。
        参数组合上限 1000。
      security:
        - ApiKeyAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestOptimizerRequest'
      responses:
        '200':
          description: 优化结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            rebalanceFrequency:
                              type: string
                            rebalanceThreshold:
                              type: number
                            initialCapital:
                              type: number
                            cagr:
                              type: number
                            maxDrawdown:
                              type: number
                            sharpe:
                              type: number
                            sortino:
                              type: number
                            stdev:
                              type: number
                            calmar:
                              type: number
                      best:
                        type: object
                        nullable: true
                        description: 最优组合（含收益曲线）
                      benchmarkGrowth:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            value:
                              type: number
                      totalCombinations:
                        type: number
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 优化运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== SaaS 路由组（ADR-033/034/035/036/019）=====
  # 企业理由：多租户 SaaS 化后，租户作用域的持久化、身份管理、计费与异步任务
  # 端点此前缺失 OpenAPI 契约，前后端协作依赖口口相传。补齐 paths 使前端可自动
  # 生成类型与请求客户端，并固化安全契约（RBAC、所有权、租户隔离）。

  # ----- /keys：按组织 API Key（ADR-033）-----
  /keys:
    post:
      tags: [saas-keys]
      summary: 创建组织 API Key
      description: |
        创建新的按组织 API Key。明文密钥仅本次响应一次性返回（`bpk_live_` 前缀），
        后续列表接口仅返回哈希后的 keyPrefix，不可再获取明文。需 ADMIN_ACCESS 权限。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: 密钥创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ApiKeyCreateResponse'
        '400':
          description: 请求体校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    get:
      tags: [saas-keys]
      summary: 列出组织 API Key
      description: |
        返回当前组织全部 API Key。响应不含明文密钥与哈希，仅含 keyPrefix、
        名称、创建时间、最后使用时间、吊销时间。需 ADMIN_ACCESS 权限。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 密钥列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeyListItem'
        '401':
          description: 未携带或携带无效 JWT,需先登录获取 Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 当前用户缺少 ADMIN_ACCESS 权限,无法管理 API Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: 服务端内部错误(如数据库不可达)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /keys/{id}:
    delete:
      tags: [saas-keys]
      summary: 吊销组织 API Key
      description: |
        软吊销指定 API Key（设置 revoked_at）。吊销后该密钥立即失效，
        但记录保留以供审计。需 ADMIN_ACCESS 权限。
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 吊销成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      revoked:
                        type: boolean
        '404':
          description: 密钥不存在或已吊销
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

