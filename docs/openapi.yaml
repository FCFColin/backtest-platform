openapi: 3.0.3

info:
  title: 回测平台 API
  version: 1.0.0
  description: |
    回测平台提供组合回测、资产分析、蒙特卡洛模拟、组合优化、有效前沿计算、
    战术分配、信号分析、PCA 主成分分析、LETF 滑点分析、目标优化等量化投资工具。

    ## 认证
    - **生产环境（REQUIRE_API_KEY=true）**：所有计算端点（`/backtest/*`、`/tactical/*` 等）**必须**携带 JWT Bearer Token（`Authorization: Bearer <accessToken>`）
    - **管理端点**（`/admin/*`、`/data/manage/*`）：JWT + RBAC 权限（如 `data:manage`、`admin:access`）
    - **兼容模式**：`x-api-key` 请求头映射为 analyst 角色（过渡用，不推荐生产长期依赖）
    - 认证流程：`POST /auth/login/password` → accessToken + refreshToken
    - 健康检查 `/health` 与 `/metrics`（可配置 METRICS_AUTH_TOKEN）无需用户 JWT

    ## 速率限制
    - 普通 API：100 次/15 分钟/IP
    - 计算密集型 API（backtest、backtest-optimizer）：10 次/分钟/IP

servers:
  - url: http://localhost:5001/api/v1
    description: 本地开发环境

tags:
  - name: backtest
    description: 回测引擎（组合回测、资产分析、蒙特卡洛模拟、组合优化、有效前沿）
  - name: data
    description: 数据查询（历史行情、搜索、CPI）
  - name: data-manage
    description: 数据引擎管理（状态、统计、更新、标的管理）
  - name: engine-go
    description: |
      Go 引擎内部端点（不对外暴露，仅供 Node.js API 内部调用）。
      端点路径前缀 /api/engine/，受 X-Engine-Auth Token 保护。
      所有计算端点无状态——priceData 由调用方传入，引擎不持久化数据。
  - name: admin
    description: 管理后台（仪表盘统计、系统资源）
  - name: health
    description: 健康检查与监控指标
  - name: tactical
    description: 战术分配（信号驱动动态权重回测）
  - name: tactical-grid
    description: 战术网格搜索（参数空间遍历优化）
  - name: pca
    description: 主成分分析
  - name: signal
    description: 信号分析（单信号、双信号、多信号）
  - name: letf
    description: 杠杆 ETF 滑点分析
  - name: goal-optimizer
    description: 目标优化（蒙特卡洛模拟财务目标达成概率）
  - name: auth
    description: 认证鉴权（登录、令牌刷新、登出、身份查询）
  - name: saas-keys
    description: 按组织 API Key 管理（ADR-033，创建/查看/吊销）
  - name: saas-portfolios
    description: 租户作用域组合持久化（ADR-034）
  - name: saas-configs
    description: 租户作用域命名配置持久化（ADR-034）
  - name: saas-runs
    description: 租户作用域回测历史持久化（ADR-034）
  - name: saas-orgs
    description: 组织与成员管理、邀请（ADR-035）
  - name: saas-billing
    description: Stripe 计费（订阅、Checkout、Billing Portal，ADR-036）
  - name: saas-jobs
    description: 异步任务状态查询（ADR-019 所有权隔离）

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 访问令牌，通过 /auth/login 获取

  parameters:
    # 企业理由：幂等性 Key 是 REST API 标准实践（Stripe、AWS 均采用），
    # 管理端点的写操作在网络抖动或客户端超时重试时可能被重复执行，
    # 导致数据重复创建或配置被反复覆盖。Idempotency-Key 让客户端能
    # 安全重试而不产生副作用。将其定义为可复用参数，管理端点的 POST
    # 操作统一引用。
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: |
        幂等性 Key，用于防止管理端点写操作的重复执行。
        - 客户端在 POST 请求中携带唯一的 Idempotency-Key
        - 相同 Key 的请求在 1 小时内返回缓存结果，不重复执行业务逻辑
        - 仅对 POST 写操作生效，GET 请求忽略此头
        - Key 长度不能超过 128 字符
        - 建议使用 UUID v4 格式

  schemas:
    # ===== 通用 =====
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          oneOf:
            - type: string
            - type: object
              required:
                - code
                - message
              properties:
                code:
                  type: string
                  description: 机器可读错误码
                message:
                  type: string
                  description: 人类可读错误描述

    # ===== 认证鉴权 =====
    # 企业理由：API 契约文档是前后端协作的唯一可靠依据。
    # 认证流程涉及令牌签发、刷新、撤销，任何字段歧义都会导致集成故障，
    # 因此必须将 LoginRequest / TokenResponse / UserInfo 等结构固化到 OpenAPI 规范中，
    # 确保客户端与服务端对令牌生命周期管理达成一致理解。
    LoginRequest:
      type: object
      required:
        - apiKey
      properties:
        apiKey:
          type: string
          description: API 密钥，用于换取访问令牌

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: 刷新令牌，用于获取新的访问令牌

    TokenResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        accessToken:
          type: string
          description: JWT 访问令牌，用于后续请求的 Bearer 认证
        refreshToken:
          type: string
          description: 刷新令牌，用于获取新的访问令牌
        expiresIn:
          type: number
          description: 访问令牌有效时长（秒）

    UserInfo:
      type: object
      required:
        - sub
        - role
        - iat
        - exp
      properties:
        sub:
          type: string
          description: 用户唯一标识
        role:
          type: string
          description: 用户角色
          enum: [admin, analyst, readonly]
        iat:
          type: number
          description: 令牌签发时间（Unix 时间戳，秒）
        exp:
          type: number
          description: 令牌过期时间（Unix 时间戳，秒）

    # RFC 7807 Problem Detail —— 认证端点统一错误格式
    # 企业理由：采用 RFC 7807 标准化错误响应，使客户端能以统一逻辑解析所有 API 错误，
    # 降低因错误格式不一致导致的集成风险和排障成本。
    ProblemDetail:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: 错误类型的 URI 标识（RFC 7807）
        title:
          type: string
          description: 人类可读的错误标题
        status:
          type: integer
          description: HTTP 状态码
        detail:
          type: string
          description: 错误详细描述
        instance:
          type: string
          format: uri
          description: 发生错误的具体请求路径

    # ===== 资产与组合 =====
    Asset:
      type: object
      required:
        - ticker
        - weight
      properties:
        id:
          type: string
        ticker:
          type: string
          description: 资产代码
        weight:
          type: number
          description: 权重百分比

    RebalanceBands:
      type: object
      properties:
        enabled:
          type: boolean
        absoluteBand:
          type: number
          description: 绝对偏离百分比
        relativeBand:
          type: number
          description: 相对偏离百分比
        upperBand:
          type: number
          description: 上限偏离百分比
        lowerBand:
          type: number
          description: 下限偏离百分比

    Portfolio:
      type: object
      required:
        - id
        - name
        - assets
        - rebalanceFrequency
      properties:
        id:
          type: string
        name:
          type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        rebalanceFrequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, annual, none, threshold]
        rebalanceThreshold:
          type: number
          description: 偏离调仓阈值（百分比），仅 threshold 模式有效
        rebalanceOffset:
          type: number
          description: 调仓偏移（交易日）
        rebalanceBands:
          $ref: '#/components/schemas/RebalanceBands'
        drag:
          type: number
          description: 年化拖累百分比，如 0.5 表示每年额外扣除 0.5%
        totalReturn:
          type: boolean
          description: 是否将分红再投资
        isGlidepath:
          type: boolean
        glidepathFrom:
          type: string
        glidepathTo:
          type: string
        glidepathYears:
          type: number
        glidepathToWeights:
          type: array
          items:
            type: number

    CashflowLeg:
      type: object
      required:
        - id
        - amount
        - type
        - frequency
        - offset
      properties:
        id:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [contribution, withdrawal]
        frequency:
          type: string
          enum: [yearly, monthly, quarterly, weekly]
        offset:
          type: number
        until:
          type: string
          description: 结束日期

    OneTimeCashflow:
      type: object
      required:
        - id
        - amount
        - type
        - date
      properties:
        id:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [contribution, withdrawal]
        date:
          type: string
          format: date

    BacktestParameters:
      type: object
      required:
        - startDate
        - endDate
        - startingValue
        - adjustForInflation
        - rollingWindowMonths
        - benchmarkTicker
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        startingValue:
          type: number
        baseCurrency:
          type: string
          enum: [usd, cny]
          default: usd
        adjustForInflation:
          type: boolean
        rollingWindowMonths:
          type: number
          default: 12
        benchmarkTicker:
          type: string
        extendedWithdrawalStats:
          type: boolean
        cashflowLegs:
          type: array
          items:
            $ref: '#/components/schemas/CashflowLeg'
        oneTimeCashflows:
          type: array
          items:
            $ref: '#/components/schemas/OneTimeCashflow'

    # ===== 统计 =====
    Statistics:
      type: object
      properties:
        cagr:
          type: number
        mwrr:
          type: number
        totalReturn:
          type: number
        bestYear:
          type: number
        worstYear:
          type: number
        avgYear:
          type: number
        stdev:
          type: number
        maxDrawdown:
          type: number
        maxDrawdownDuration:
          type: number
        sharpe:
          type: number
        sortino:
          type: number
        calmar:
          type: number
        ulcerIndex:
          type: number
        alpha:
          type: number
        beta:
          type: number
        rSquared:
          type: number
        trackingError:
          type: number
        informationRatio:
          type: number
        upsideCapture:
          type: number
        downsideCapture:
          type: number
        var5:
          type: number
        cvar5:
          type: number
        skewness:
          type: number
        excessKurtosis:
          type: number
        pctPositiveDays:
          type: number
        maxDailyReturn:
          type: number
        minDailyReturn:
          type: number

    DragResult:
      type: object
      properties:
        totalDrag:
          type: number
        annualDrag:
          type: number
        dragSeries:
          type: array
          items:
            type: number

    PortfolioResult:
      type: object
      properties:
        name:
          type: string
        growthCurve:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number
        drawdownCurve:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              drawdown:
                type: number
        rollingReturns:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              return:
                type: number
        annualReturns:
          type: array
          items:
            type: object
            properties:
              year:
                type: integer
              return:
                type: number
        monthlyReturns:
          type: array
          items:
            type: object
            properties:
              year:
                type: integer
              month:
                type: integer
              return:
                type: number
        statistics:
          $ref: '#/components/schemas/Statistics'
        drag:
          $ref: '#/components/schemas/DragResult'

    BacktestResult:
      type: object
      properties:
        portfolios:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioResult'
        correlations:
          type: array
          items:
            type: array
            items:
              type: number
        benchmarkGrowth:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number

    # ===== 战术分配 =====
    SignalCondition:
      type: object
      required:
        - indicator
        - period
        - operator
        - threshold
      properties:
        indicator:
          type: string
          enum: [sma, ema, rsi, macd, bollinger, momentum]
        period:
          type: number
        operator:
          type: string
          enum: [gt, lt, cross_above, cross_below]
        threshold:
          type: number

    TradingSignal:
      type: object
      required:
        - id
        - name
        - conditions
        - targetWeights
      properties:
        id:
          type: string
        name:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/SignalCondition'
        targetWeights:
          type: array
          items:
            type: object
            required:
              - ticker
              - weight
            properties:
              ticker:
                type: string
              weight:
                type: number

    TacticalStrategy:
      type: object
      required:
        - id
        - name
        - signals
        - aggregationMethod
      properties:
        id:
          type: string
        name:
          type: string
        signals:
          type: array
          items:
            $ref: '#/components/schemas/TradingSignal'
        aggregationMethod:
          type: string
          enum: [weighted_average, rank, voting]
        rankingConfig:
          type: object
          properties:
            method:
              type: string
              enum: [fixed_share, risk_parity]
            topN:
              type: number

    EmailAlertConfig:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        email:
          type: string
          format: email
        triggers:
          type: array
          items:
            type: string
            enum: [signal_change, rebalance, threshold]

    # ===== 信号分析 =====
    SignalAnalysisRequest:
      type: object
      required:
        - ticker
        - indicator
        - period
        - threshold
        - startDate
        - endDate
        - signalType
      properties:
        ticker:
          type: string
        indicator:
          type: string
          description: '技术指标：sma, ema, rsi, macd, bollinger'
        period:
          type: number
        threshold:
          type: number
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        signalType:
          type: string
          enum: [entry, exit, both]

    SignalAnalysisResult:
      type: object
      properties:
        signals:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              type:
                type: string
                enum: [buy, sell]
              price:
                type: number
        statistics:
          type: object
          properties:
            totalSignals:
              type: number
            winRate:
              type: number
            avgReturn:
              type: number
            maxDrawdown:
              type: number
            sharpe:
              type: number
        equityCurve:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number

    DualSignalConfig:
      type: object
      required:
        - signal1
        - signal2
        - combinationMethod
      properties:
        signal1:
          $ref: '#/components/schemas/SignalAnalysisRequest'
        signal2:
          $ref: '#/components/schemas/SignalAnalysisRequest'
        combinationMethod:
          type: string
          enum: [and, or, xor]

    MultiSignalConfig:
      type: object
      required:
        - signals
        - aggregationMethod
      properties:
        signals:
          type: array
          items:
            $ref: '#/components/schemas/SignalAnalysisRequest'
        aggregationMethod:
          type: string
          enum: [weighted, voting, rank]
        weights:
          type: array
          items:
            type: number

    # ===== PCA =====
    PCARequest:
      type: object
      required:
        - tickers
        - startDate
        - endDate
      properties:
        tickers:
          type: array
          items:
            type: string
          minItems: 2
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        numComponents:
          type: number
          description: 保留的主成分数量，默认全部保留

    PCAResult:
      type: object
      properties:
        eigenvalues:
          type: array
          items:
            type: number
        cumulativeVariance:
          type: array
          items:
            type: number
        loadings:
          type: array
          items:
            type: array
            items:
              type: number
        scores:
          type: array
          items:
            type: array
            items:
              type: number
        tickers:
          type: array
          items:
            type: string

    # ===== LETF =====
    LETFRequest:
      type: object
      required:
        - letfTicker
        - benchmarkTicker
        - leverage
        - startDate
        - endDate
      properties:
        letfTicker:
          type: string
          description: 杠杆 ETF 代码
        benchmarkTicker:
          type: string
          description: 基准指数代码
        leverage:
          type: number
          description: 杠杆倍数（正数）
          minimum: 0
          exclusiveMinimum: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    LETFResult:
      type: object
      properties:
        slippageCurve:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              slippage:
                type: number
        annualDecay:
          type: number
          description: 年化拖累
        effectiveLeverage:
          type: array
          items:
            type: number
        stats:
          type: object
          properties:
            benchmarkReturn:
              type: number
            letfReturn:
              type: number
            expectedReturn:
              type: number
            slippage:
              type: number

    # ===== 目标优化 =====
    GoalOptimizerRequest:
      type: object
      required:
        - targetAmount
        - initialAmount
        - years
        - assets
      properties:
        targetAmount:
          type: number
          description: 目标金额（正数）
          minimum: 0
          exclusiveMinimum: true
        initialAmount:
          type: number
          description: 初始金额（正数）
          minimum: 0
          exclusiveMinimum: true
        years:
          type: number
          description: 时间范围（年，正数）
          minimum: 0
          exclusiveMinimum: true
        assets:
          type: array
          items:
            type: object
            required:
              - ticker
              - weight
            properties:
              ticker:
                type: string
              weight:
                type: number
          minItems: 1
        constraints:
          type: object
          properties:
            maxDrawdown:
              type: number
              description: 最大回撤约束（小数形式）
            minSuccessRate:
              type: number
              description: 最低成功率约束
            maxVolatility:
              type: number
              description: 最大波动率约束（年化，小数形式）
        numSimulations:
          type: number
          description: 蒙特卡洛模拟次数，默认 1000，上限 10000
          default: 1000
          maximum: 10000

    GoalOptimizerResult:
      type: object
      properties:
        successProbability:
          type: number
          description: 达成目标的概率（0-1）
        probabilityCurve:
          type: array
          items:
            type: object
            properties:
              amount:
                type: number
              probability:
                type: number
        optimalPath:
          type: array
          items:
            type: object
            properties:
              year:
                type: number
              median:
                type: number
              p10:
                type: number
              p90:
                type: number
        recommendation:
          type: object
          properties:
            expectedReturn:
              type: number
            requiredContribution:
              type: number
              description: 建议每年定期投入金额
            successRate:
              type: number

    # ===== Go 引擎内部契约 =====
    EngineBacktestParams:
      type: object
      required:
        - startDate
        - endDate
        - startingValue
        - adjustForInflation
        - rollingWindowMonths
        - benchmarkTicker
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        startingValue:
          type: number
        adjustForInflation:
          type: boolean
        rollingWindowMonths:
          type: number
        benchmarkTicker:
          type: string
        extendedWithdrawalStats:
          type: boolean
        cashflowLegs:
          type: array
          items:
            $ref: '#/components/schemas/CashflowLeg'
        oneTimeCashflows:
          type: array
          items:
            $ref: '#/components/schemas/OneTimeCashflow'

    EngineBacktestResponse:
      type: object
      properties:
        portfolios:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              growthCurve:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                    value:
                      type: number
              drawdownCurve:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                    drawdown:
                      type: number
              statistics:
                $ref: '#/components/schemas/Statistics'
        correlations:
          type: array
          items:
            type: array
            items:
              type: number
        benchmarkGrowth:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number

    # ===== 回测优化器 =====
    OptimizeRequest:
      type: object
      required:
        - tickers
        - parameters
      properties:
        tickers:
          type: array
          items:
            type: string
          maxItems: 50
        objective:
          type: string
          enum: [maxSharpe, minVolatility, maxReturn]
          description: 优化目标
        constraints:
          type: object
          properties:
            minWeight:
              type: number
            maxWeight:
              type: number
        parameters:
          $ref: '#/components/schemas/BacktestParameters'
        riskFreeRate:
          type: number
        numIterations:
          type: number
          description: 迭代次数，上限 100000，默认 10000

    BacktestOptimizerRequest:
      type: object
      required:
        - portfolio
        - parameterSpace
        - parameters
        - objective
      properties:
        portfolio:
          type: object
          required:
            - assets
          properties:
            name:
              type: string
            assets:
              type: array
              items:
                type: object
                required:
                  - ticker
                  - weight
                properties:
                  ticker:
                    type: string
                  weight:
                    type: number
        parameterSpace:
          type: object
          required:
            - rebalanceFrequencies
            - initialCapital
          properties:
            rebalanceFrequencies:
              type: array
              items:
                type: string
                enum: [daily, weekly, monthly, quarterly, annual, none, threshold]
            rebalanceThreshold:
              type: object
              properties:
                min:
                  type: number
                max:
                  type: number
                step:
                  type: number
            initialCapital:
              type: object
              required:
                - min
                - max
                - step
              properties:
                min:
                  type: number
                max:
                  type: number
                step:
                  type: number
        parameters:
          type: object
          required:
            - startDate
            - endDate
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            benchmarkTicker:
              type: string
            baseCurrency:
              type: string
              enum: [usd, cny]
            adjustForInflation:
              type: boolean
        objective:
          type: string
          enum: [maxCagr, minMaxDrawdown, maxSharpe, maxSortino]
        constraints:
          type: object
          properties:
            maxDrawdown:
              type: number
              description: 最大回撤百分比，如 20 表示 20%
            minCagr:
              type: number
              description: 最低年化收益百分比

    # ===== 战术网格搜索 =====
    TacticalGridRequest:
      type: object
      required:
        - indicator
        - param1
        - param2
        - tickers
        - startDate
        - endDate
        - startingValue
        - rebalanceFrequency
        - objective
      properties:
        indicator:
          type: string
          enum: [sma, ema, rsi]
        param1:
          type: object
          required:
            - min
            - max
            - step
          properties:
            min:
              type: number
            max:
              type: number
            step:
              type: number
          description: 参数1范围（周期）
        param2:
          type: object
          required:
            - min
            - max
            - step
          properties:
            min:
              type: number
            max:
              type: number
            step:
              type: number
          description: 参数2范围（阈值）
        tickers:
          type: array
          items:
            type: string
          minItems: 1
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        startingValue:
          type: number
        rebalanceFrequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, annual, none]
        objective:
          type: string
          enum: [maxCAGR, minDrawdown, maxSharpe]
        topN:
          type: number
          default: 10
          description: 返回 Top N 结果

    # ===== 蒙特卡洛 =====
    MonteCarloParams:
      type: object
      properties:
        numSimulations:
          type: number
          description: 模拟次数
        blockSize:
          type: number
          description: 区块大小
        withReplacement:
          type: boolean
        confidenceLevel:
          type: number
        distribution:
          type: string
        seed:
          type: number

    # ===== SaaS 持久化与多租户（ADR-033/034/035/036/019）=====
    ApiKeyCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 120
          description: 密钥可读名称（用户自定义）

    ApiKeyCreateResponse:
      type: object
      required:
        - id
        - name
        - keyPrefix
        - apiKey
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
          description: 密钥前缀（如 bpk_live_xxxx），用于 UI 展示与定位
        apiKey:
          type: string
          description: 明文密钥，仅创建时一次性返回（bpk_live_ 前缀），后续不可再获取
        createdAt:
          type: string
          format: date-time

    ApiKeyListItem:
      type: object
      required:
        - id
        - name
        - keyPrefix
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    PortfolioSaveRequest:
      type: object
      required:
        - name
        - assets
      properties:
        name:
          type: string
          maxLength: 120
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        rebalanceFrequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, annual, none, threshold]

    SavedConfigRequest:
      type: object
      required:
        - name
        - config
      properties:
        name:
          type: string
          maxLength: 120
        config:
          type: object
          description: 嵌套配置 JSONB（回测参数、组合等任意可序列化结构）

    SavedConfig:
      type: object
      required:
        - id
        - name
        - config
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        config:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BacktestRunRequest:
      type: object
      required:
        - request
      properties:
        name:
          type: string
          maxLength: 120
          nullable: true
        request:
          type: object
          description: 回测请求快照（JSONB，不可变）
        result:
          type: object
          nullable: true
          description: 回测结果（JSONB）
        status:
          type: string
          enum: [pending, running, completed, failed]

    BacktestRun:
      type: object
      required:
        - id
        - request
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        request:
          type: object
        result:
          type: object
          nullable: true
        status:
          type: string
          enum: [pending, running, completed, failed]
        createdAt:
          type: string
          format: date-time

    OrgInfo:
      type: object
      required:
        - orgId
        - name
        - slug
        - plan
        - status
      properties:
        orgId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [free, pro, enterprise]
        status:
          type: string
          enum: [active, suspended, canceled]

    OrgMember:
      type: object
      required:
        - userId
        - username
        - role
        - createdAt
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [owner, admin, analyst, readonly]
        createdAt:
          type: string
          format: date-time

    InvitationCreateRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, analyst, readonly]
          default: analyst

    Invitation:
      type: object
      required:
        - id
        - email
        - role
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, analyst, readonly]
        invitedBy:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    AcceptInvitationRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          maxLength: 256

    SubscriptionSummary:
      type: object
      properties:
        plan:
          type: string
          enum: [free, pro, enterprise]
        status:
          type: string
        stripeCustomerId:
          type: string
          nullable: true

    BillingSubscriptionResponse:
      type: object
      required:
        - enabled
        - subscription
      properties:
        enabled:
          type: boolean
          description: 计费功能是否启用（STRIPE_SECRET_KEY 是否配置）
        publishableKey:
          type: string
          nullable: true
        subscription:
          $ref: '#/components/schemas/SubscriptionSummary'

    CheckoutRequest:
      type: object
      required:
        - plan
      properties:
        plan:
          type: string
          enum: [pro, enterprise]

    BillingUrlResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri

    JobStatus:
      type: object
      required:
        - id
        - type
        - state
        - createdAt
      properties:
        id:
          type: string
        type:
          type: string
          enum: [optimizer, grid-search]
        state:
          type: string
          enum: [completed, failed, active, waiting, delayed]
        createdAt:
          type: integer
          description: 任务创建时间戳（毫秒）
        processedAt:
          type: integer
          nullable: true
        finishedAt:
          type: integer
          nullable: true
        result:
          type: object
          nullable: true
          description: 任务返回值（仅 completed 状态）
        error:
          type: string
          nullable: true
          description: 失败原因（仅 failed 状态）

paths:
  # ===== 认证鉴权 =====
  # 企业理由：认证端点是系统安全边界的第一道关卡，
  # 将其契约固化到 OpenAPI 规范中，确保令牌签发、刷新、撤销、
  # 身份查询等流程的前后端实现严格一致，避免因接口理解偏差导致安全漏洞。

  /auth/login:
    post:
      tags: [auth]
      summary: API 密钥登录
      description: |
        使用 API 密钥换取访问令牌和刷新令牌。
        返回的 accessToken 用于后续请求的 Bearer 认证，
        refreshToken 用于在 accessToken 过期后获取新的令牌对。
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功，返回令牌对
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: API 密钥无效或已禁用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/refresh:
    post:
      tags: [auth]
      summary: 刷新访问令牌
      description: |
        使用刷新令牌获取新的访问令牌和刷新令牌对。
        旧的刷新令牌在换取后立即失效（一次性使用），防止令牌重放攻击。
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 刷新成功，返回新令牌对
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: 刷新令牌无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/logout:
    delete:
      tags: [auth]
      summary: 登出并撤销令牌
      description: |
        撤销指定的刷新令牌，使其无法再用于获取新的访问令牌。
        需要提供有效的 Bearer 访问令牌进行身份验证。

        **HTTP 方法语义**：logout 语义为"删除/撤销会话令牌"，
        对应 REST 中 DELETE 方法（RFC 9110 §9.3）。
        DELETE 表示"删除目标资源"，logout 正是删除一个已存在的会话/令牌资源。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: 需要撤销的刷新令牌
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  message:
                    type: string
        '401':
          description: 访问令牌无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    post:
      tags: [auth]
      summary: '（已废弃）登出并撤销令牌'
      deprecated: true
      description: |
        **已废弃**，请使用 DELETE /auth/logout 替代。

        此端点将在 Sunset 日期后移除。迁移期间仍可使用，
        但响应将包含 Deprecation 和 Sunset 头。

        废弃原因：logout 语义为"删除会话/令牌"，应使用 DELETE 方法
        而非 POST，以符合 RESTful 语义（RFC 9110 §9.3）。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: 需要撤销的刷新令牌
      responses:
        '200':
          description: 登出成功（已废弃）
          headers:
            Deprecation:
              schema:
                type: string
                enum: ['true']
              description: 'RFC 8594 - 此端点已废弃'
            Sunset:
              schema:
                type: string
                format: date
              description: 'RFC 8594 - 此端点将被移除的日期'
            Link:
              schema:
                type: string
              description: '指向替代端点，格式: </api/v1/auth/logout>; rel="successor-version"'
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  message:
                    type: string
        '401':
          description: 访问令牌无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/me:
    get:
      tags: [auth]
      summary: 查询当前身份
      description: |
        返回当前 Bearer 令牌对应的用户身份信息，包括用户标识、角色、
        令牌签发时间和过期时间。用于客户端验证令牌有效性及获取用户角色。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 当前用户身份信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: 访问令牌无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  # ===== 回测引擎 =====
  /backtest/search:
    get:
      tags: [backtest]
      summary: 搜索资产代码
      description: 根据关键词搜索匹配的资产代码
      security:
        - ApiKeyAuth: []
        - {}
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: 搜索关键词
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: 返回结果数量上限
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        '400':
          description: 缺少 query 参数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 搜索失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backtest/portfolio:
    post:
      tags: [backtest]
      summary: 运行组合回测
      description: |
        接收组合配置和回测参数，运行组合回测。
        Go 引擎为唯一计算后端；引擎不可用时返回 503 + Retry-After（fail-closed，ADR-031）。
        响应不包含 `degraded` 字段（无 Node 降级路径）。
      security:
        - ApiKeyAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - portfolios
                - parameters
              properties:
                portfolios:
                  type: array
                  items:
                    $ref: '#/components/schemas/Portfolio'
                  maxItems: 50
                parameters:
                  $ref: '#/components/schemas/BacktestParameters'
      responses:
        '200':
          description: 回测结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BacktestResult'
                  degraded:
                    type: boolean
                    description: 始终为 false（Go 引擎 fail-closed，ADR-031）；保留字段仅向后兼容
                  degradedWarning:
                    type: string
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 回测运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backtest/analysis:
    post:
      tags: [backtest]
      summary: 运行资产分析
      description: 对多个资产行情数据进行分析，计算收益率、相关性等统计指标
      security:
        - ApiKeyAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tickers
                - parameters
              properties:
                tickers:
                  oneOf:
                    - type: array
                      items:
                        type: string
                      maxItems: 50
                    - type: string
                      description: 空格或逗号分隔的 ticker 字符串
                parameters:
                  $ref: '#/components/schemas/BacktestParameters'
      responses:
        '200':
          description: 分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      tickers:
                        type: array
                        items:
                          type: object
                      correlations:
                        type: array
                        items:
                          type: array
                          items:
                            type: number
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 优化运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Go 引擎内部端点 =====
  # 以下端点由 Go engine-go 服务提供，Node.js API 内部调用（不对外暴露）。
  # 路径前缀 /api/engine/，通过 X-Engine-Auth header 鉴权。
  # Go 引擎所有计算端点无状态：priceData 由调用方传入，引擎不持久化。

  /api/engine/backtest:
    post:
      tags: [engine-go]
      summary: 组合回测（内部）
      description: Go 引擎主回测接口。接收 priceData、portfolios 与 params，返回净值曲线、统计指标、回撤等。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - portfolios
                - priceData
                - params
              properties:
                portfolios:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      assets:
                        type: array
                        items:
                          type: object
                          properties:
                            ticker:
                              type: string
                            weight:
                              type: number
                      rebalanceFrequency:
                        type: string
                      rebalanceThreshold:
                        type: number
                      rebalanceOffset:
                        type: number
                      drag:
                        type: number
                      totalReturn:
                        type: boolean
                      rebalanceBands:
                        type: object
                        properties:
                          absolute:
                            type: number
                          relative:
                            type: number
                      glidepathToWeights:
                        type: array
                        items:
                          type: number
                      glidepathYears:
                        type: number
                priceData:
                  type: object
                  additionalProperties:
                    type: object
                    additionalProperties:
                      type: number
                  description: '{ ticker: { date: close_price } }'
                params:
                  $ref: '#/components/schemas/EngineBacktestParams'
                cpiData:
                  type: object
                  additionalProperties:
                    type: number
                exchangeRates:
                  type: object
                  additionalProperties:
                    type: number
      responses:
        '200':
          description: 回测结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineBacktestResponse'
        '400':
          description: 请求参数错误
        '500':
          description: 引擎计算错误

  /api/engine/analysis:
