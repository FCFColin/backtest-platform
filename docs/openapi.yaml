                      saved:
                        type: boolean
                      config:
                        $ref: '#/components/schemas/EmailAlertConfig'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 保存失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

