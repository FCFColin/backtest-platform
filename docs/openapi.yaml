  # ===== 战术分配 =====
  /tactical/backtest:
    post:
      tags: [tactical]
      summary: 运行战术分配回测
      description: |
        接收战术策略配置，计算信号并运行动态权重回测。
        同时运行等权基准回测作为对比。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - strategy
                - startDate
                - endDate
                - startingValue
                - rebalanceFrequency
              properties:
                strategy:
                  $ref: '#/components/schemas/TacticalStrategy'
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                startingValue:
                  type: number
                rebalanceFrequency:
                  type: string
                  enum: [daily, weekly, monthly, quarterly, annual, none]
      responses:
        '200':
          description: 战术回测结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      portfolio:
                        $ref: '#/components/schemas/PortfolioResult'
                      benchmark:
                        $ref: '#/components/schemas/PortfolioResult'
                      signalHistory:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            activeSignals:
                              type: array
                              items:
                                type: string
                            weights:
                              type: array
                              items:
                                type: object
                                properties:
                                  ticker:
                                    type: string
                                  weight:
                                    type: number
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 回测运行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tactical/what-if:
    post:
      tags: [tactical]
      summary: 实时价格查询与信号状态
      description: 接收 ticker 列表，返回实时价格与当前信号状态
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tickers
                - strategy
              properties:
                tickers:
                  type: array
                  items:
                    type: string
                  minItems: 1
                strategy:
                  $ref: '#/components/schemas/TacticalStrategy'
                endDate:
                  type: string
                  format: date
                  description: 可选，默认当天
      responses:
        '200':
          description: 实时信号状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                        currentPrice:
                          type: number
                        signalDate:
                          type: string
                        signalType:
                          type: string
                          enum: [buy, sell, hold]
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 查询失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

