  # ===== 管理后台 =====
  /admin/stats:
    get:
      tags: [admin]
      summary: 仪表盘统计数据
      description: 返回服务健康状态、数据统计、系统信息等仪表盘数据
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 仪表盘数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      services:
                        type: object
                        properties:
                          rust_engine:
                            type: object
                            properties:
                              status:
                                type: string
                                enum: [healthy, unhealthy]
                              latency_ms:
                                type: number
                              version:
                                type: string
                              error:
                                type: string
                          go_data_service:
                            type: object
                            properties:
                              status:
                                type: string
                                enum: [healthy, unhealthy]
                              latency_ms:
                                type: number
                              version:
                                type: string
                              error:
                                type: string
                      data_stats:
                        type: object
                      system:
                        type: object
                        properties:
                          memory:
                            type: object
                            properties:
                              rss_mb:
                                type: number
                              heap_used_mb:
                                type: number
                              heap_total_mb:
                                type: number
                              external_mb:
                                type: number
                          uptime_seconds:
                            type: number
                          uptime_formatted:
                            type: string
                      backtest_history:
                        type: array
                        items:
                          type: object
        '500':
          description: 获取统计数据失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

