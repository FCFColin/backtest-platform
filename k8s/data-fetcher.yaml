# 企业理由：Go 数据服务负责数据获取与缓存，多副本确保高可用。
# 单副本即单点故障——Pod 重启/迁移期间数据服务完全不可用。
# 2 副本 + readinessProbe 确保滚动更新和节点故障时仍有实例可用。
# 权衡：多副本增加资源消耗，但数据服务是回测平台核心依赖，
# 不可用会导致所有数据请求降级，影响用户体验。
#
# 命名统一（R-17）：服务名 data-fetcher 与 docker-compose（services.data-fetcher）
# 一致；原 k8s 清单为 go-data，现已统一。镜像名 backtest-platform/data-fetcher
# 与 docker-compose 构建上下文 ./data-fetcher 对齐。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-fetcher
  namespace: backtest-platform
  labels:
    app: data-fetcher
    app.kubernetes.io/part-of: backtest-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-fetcher
  template:
    metadata:
      labels:
        app: data-fetcher
        app.kubernetes.io/part-of: backtest-platform
    spec:
      containers:
        - name: data-fetcher
          image: backtest-platform/data-fetcher
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5003
          resources:
            requests:
              memory: '256Mi'
              cpu: '0.5'
            limits:
              memory: '512Mi'
              cpu: '1'
          startupProbe:
            httpGet:
              path: /api/data/health
              port: 5003
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/data/health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/data/health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# 企业理由：ClusterIP 为 Go 数据服务提供稳定的集群内访问端点，
# API 服务通过此 Service 路由数据获取请求。
# 服务名 data-fetcher 与 docker-compose（services.data-fetcher）一致（R-17）；
# configmap GO_DATA_SERVICE_URL=http://data-fetcher:5003 指向此 Service。
# 权衡：ClusterIP 仅集群内可达，数据服务无需外部直接访问。
apiVersion: v1
kind: Service
metadata:
  name: data-fetcher
  namespace: backtest-platform
  labels:
    app: data-fetcher
    app.kubernetes.io/part-of: backtest-platform
spec:
  type: ClusterIP
  selector:
    app: data-fetcher
  ports:
    - port: 5003
      targetPort: 5003
      protocol: TCP
      name: data
---
# 企业理由：PodDisruptionBudget 确保自愿驱逐（kubectl drain/集群升级）时
# data-fetcher 服务保持最小可用副本数。数据服务不可用将导致数据请求降级。
# 当前 data-fetcher replicas:2，minAvailable:1 意味着最多允许 1 个 Pod 被驱逐。
# 命名统一（R-17）：原 go-data-pdb，现 data-fetcher-pdb 与 docker-compose 一致。
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: data-fetcher-pdb
  namespace: backtest-platform
  labels:
    app.kubernetes.io/part-of: backtest-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: data-fetcher
