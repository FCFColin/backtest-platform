# =============================================================================
# 前端 Deployment（从原合并 Deployment 拆分而来，R-15）
# =============================================================================
#
# 企业理由：前端 nginx 托管 Vite 构建静态产物，并反代 /api/ → http://api:5001
# （见 docker/nginx/default.conf）。独立 Deployment 后可按 IO 负载独立伸缩，
# 不受 API 计算扩缩影响，滚动发布互不干扰。
#
# 端口 80 与 docker-compose（frontend 127.0.0.1:80:80）、Dockerfile.frontend
# （EXPOSE 80）保持一致。镜像名 backtest-platform/frontend 与 docker-compose
# 服务名 frontend 对齐。
#
# 安全：readOnlyRootFilesystem=true + emptyDir 挂载 nginx 可写路径
# （/var/cache/nginx、/var/run、/tmp）。nginx:stable-alpine 已将 access/error
# 日志 symlink 到 /dev/stdout|stderr，故 /var/log/nginx 无需额外挂载。
# NET_BIND_SERVICE 允许非 root 的 nginx（UID 101）绑定 80 端口。
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: backtest-platform
  labels:
    app: frontend
    app.kubernetes.io/part-of: backtest-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: backtest-platform
    spec:
      containers:
        - name: frontend
          image: backtest-platform/frontend
          securityContext:
            runAsNonRoot: true
            runAsUser: 101 # nginx:stable-alpine 内置 nginx 用户 UID/GID 101
            runAsGroup: 101
            fsGroup: 101 # emptyDir 归属 GID 101，nginx 可写
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE # 允许非 root 绑定 80 端口
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: '64Mi'
              cpu: '0.1'
            limits:
              memory: '256Mi'
              cpu: '0.5'
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
