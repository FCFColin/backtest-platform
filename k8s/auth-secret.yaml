# 企业理由：服务间认证 token 属于敏感凭据，必须存储在 Secret 而非 ConfigMap。
# Secret 提供 etcd 级加密（encryption-at-rest）和 RBAC 访问控制。
# 权衡：Secret 与 ConfigMap 一样不支持自动轮换，需配合 External Secrets Operator 实现。
# 生产环境应使用 External Secrets Operator 从 Vault/AWS Secrets Manager 同步。
# 以下值仅为开发/演示用途，生产环境必须覆盖为强随机值（>=32 chars）。
apiVersion: v1
kind: Secret
metadata:
  name: auth-tokens
  namespace: backtest-platform
  labels:
    app.kubernetes.io/part-of: backtest-platform
type: Opaque
stringData:
  ENGINE_AUTH_TOKEN: 'dev-engine-auth-token-change-in-production'
  DATA_SERVICE_AUTH_TOKEN: 'dev-data-service-auth-token-change-in-production'
