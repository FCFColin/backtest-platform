# 企业理由：非敏感配置集中管理，避免在每个 Deployment 中硬编码环境变量。
# 修改配置只需更新 ConfigMap + 滚动重启，无需重新构建镜像。
# 权衡：ConfigMap 不适合敏感数据（需用 Secret），且更新后需手动触发 Pod 重启。
apiVersion: v1
kind: ConfigMap
metadata:
  name: backtest-config
  namespace: backtest-platform
  labels:
    app.kubernetes.io/part-of: backtest-platform
data:
  NODE_ENV: 'production'
  API_PORT: '5001'
  GO_ENGINE_URL: 'http://engine-go:5004'
  # R-17：服务名 data-fetcher 与 docker-compose（services.data-fetcher）一致
  GO_DATA_SERVICE_URL: 'http://data-fetcher:5003'
  # Redis 连接串：指向 redis Service（k8s/redis.yaml）。
  # 无密码，与 docker-compose（redis 无 AUTH）及后端默认值一致；
  # 生产环境应在 REDIS_URL 中携带凭证并经 Secret 注入（见 redis.yaml 注释）。
  REDIS_URL: 'redis://redis:6379'
  CORS_ORIGINS: 'https://backtest.local'
  ENGINE_TIMEOUT_MS: '5000'
---
# Production: use External Secrets Operator or sealed-secrets. See docs/deployment.md
# 企业理由：服务间认证 token 属于敏感凭据，必须存储在 Secret 而非 ConfigMap。
# Secret 提供 etcd 级加密（encryption-at-rest）和 RBAC 访问控制。
# 权衡：Secret 与 ConfigMap 一样不支持自动轮换，需配合 External Secrets Operator 实现。
# 生产环境应使用 External Secrets Operator 从 Vault/AWS Secrets Manager 同步。
# 以下值已占位符化（<REPLACE_ME>），部署前必须经 External Secrets Operator /
# sealed-secrets 注入强随机值（>=32 chars），禁止提交明文（R-18）。
apiVersion: v1
kind: Secret
metadata:
  name: auth-tokens
  namespace: backtest-platform
  labels:
    app.kubernetes.io/part-of: backtest-platform
type: Opaque
stringData:
  ENGINE_AUTH_TOKEN: '<REPLACE_ME>'
  DATA_SERVICE_AUTH_TOKEN: '<REPLACE_ME>'
---
# 企业理由：多租户 K8s 集群中，不同项目共享集群时需要命名空间隔离资源与权限。
# 权衡：命名空间增加了跨服务发现的配置复杂度，但安全隔离收益远大于此。
apiVersion: v1
kind: Namespace
metadata:
  name: backtest-platform
  labels:
    app.kubernetes.io/part-of: backtest-platform
