# =============================================================================
# Redis 7 StatefulSet + Service（ADR-018：会话/限流/缓存/任务队列）
# =============================================================================
#
# 企业理由：Refresh Token、限流计数、幂等键、BullMQ 队列均依赖 Redis（ADR-018）。
# 此前 k8s 清单缺失 Redis，导致生产拓扑不完整（与 docker-compose 不一致，
# 无法在集群内复现会话/限流/队列行为）。StatefulSet + volumeClaimTemplates
# 保证 /data 跨 Pod 重启持久化（AOF），避免会话与队列状态丢失。
#
# 与 docker-compose 一致性：
# - 镜像基线 redis:7-alpine（docker-compose 的 sha256 摘要为全 0 占位，
#   非真实值，此处改用 tag；如需 pin digest 应填入真实 sha256）。
# - 无密码：docker-compose redis 未配置 AUTH，后端 REDIS_URL 亦无凭证
#   （config/index.ts 默认 redis://localhost:6379）。此处保持一致。
#   生产环境应通过 Secret 注入 REDIS_PASSWORD 并在 REDIS_URL 中携带凭证
#   （redis://:<password>@redis:6379），见 docs/deployment.md。
# - 持久化偏离：docker-compose 用 --appendonly no（开发态临时缓存）；
#   StatefulSet 既分配 PVC 持久化 /data，则启用 AOF（--appendonly yes），
#   否则 PVC 形同虚设。
#
# 权衡：StatefulSet 扩缩容按序（redis 单实例足够），PVC 与 Pod 绑定，
# 删除 Pod 后数据保留。开发环境 1Gi 足够（会话/队列元数据）；生产建议 5Gi+。
# =============================================================================
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: backtest-platform
  labels:
    app: redis
    app.kubernetes.io/part-of: backtest-platform
spec:
  serviceName: redis # 关联 Headless Service，提供稳定 DNS：redis-0.redis.backtest-platform.svc.cluster.local
  replicas: 1 # 开发环境 1 副本；生产环境建议主从 + Sentinel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: backtest-platform
    spec:
      # 安全上下文：以 redis 用户（UID 999）运行，禁止 root
      # 企业理由：容器以 root 运行是 K8s 安全基线违规（CIS Benchmark 5.2.6）。
      # redis:7-alpine 镜像内置 UID 999 的 redis 用户，
      # runAsNonRoot + runAsUser=999 确保即使镜像配置错误也无法提权。
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      containers:
        - name: redis
          image: redis:7-alpine
          # 启用 AOF 持久化：与 docker-compose（--appendonly no）不同，
          # StatefulSet 分配 PVC 持久化 /data，需启用 AOF 才能让 PVC 生效。
          # 权衡：AOF 有微小性能开销，但保证会话/队列状态跨重启不丢失。
          command: ['redis-server', '--appendonly', 'yes']
          ports:
            - containerPort: 6379
              name: redis
          # 资源限制：开发环境保守配置
          # 企业理由：Redis 内存主要受 maxmemory 影响，256Mi 限制下
          # 建议配合 maxmemory 策略（此处未设，依赖 Pod 内存限制兜底）。
          resources:
            requests:
              memory: '64Mi'
              cpu: '0.1'
            limits:
              memory: '256Mi'
              cpu: '0.5'
          # 存活探针：redis-cli ping 检查 Redis 进程是否存活
          # 企业理由：redis-cli ping 是 Redis 官方健康检查，
          # 比 TCP 探针更准确（能检测到"正在加载 RDB"等中间状态）。
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # 就绪探针：redis-cli ping 检查 Redis 是否可接受连接
          # 企业理由：与 livenessProbe 同命令，确保 Service 只将流量路由到就绪实例。
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      # PVC 模板：StatefulSet 特有，每个 Pod 自动创建独立 PVC
      volumeClaimTemplates:
        - metadata:
            name: redis-data
          spec:
            accessModes:
              - ReadWriteOnce # 单节点读写，Redis 单实例标准模式
            resources:
              requests:
                storage: 1Gi # 开发环境 1Gi；生产环境建议 5Gi+
---
# Redis Service（ClusterIP）
# 企业理由：ClusterIP 提供集群内部稳定的访问端点，
# API/Worker 通过 redis:6379 连接（configmap REDIS_URL=redis://redis:6379）。
# 不使用 LoadBalancer/NodePort——Redis 不应暴露到集群外部。
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: backtest-platform
  labels:
    app: redis
    app.kubernetes.io/part-of: backtest-platform
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
