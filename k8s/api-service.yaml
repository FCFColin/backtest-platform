# 企业理由：ClusterIP 为 API 后端提供稳定的集群内访问端点，
# 前端 nginx 反代 /api/ → http://api:5001，内部服务间调用亦经此 Service。
# 服务名 api 与 docker-compose（services.api）一致（R-17）。
# 权衡：ClusterIP 仅集群内可达，外部访问经 frontend Service + Ingress。
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: backtest-platform
  labels:
    app: api
    app.kubernetes.io/part-of: backtest-platform
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
      name: api
