# 企业理由：ClusterIP 提供集群内部稳定访问端点，配合 Deployment 实现服务发现与负载均衡。
# 权衡：ClusterIP 仅集群内可达，外部访问需 Ingress/NodePort，但内部服务间通信更安全。
apiVersion: v1
kind: Service
metadata:
  name: frontend-api
  namespace: backtest-platform
  labels:
    app: frontend-api
    app.kubernetes.io/part-of: backtest-platform
spec:
  type: ClusterIP
  selector:
    app: frontend-api
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
