# 企业理由：ClusterIP 为 Rust 引擎提供稳定的集群内访问端点，
# API 服务通过此 Service 路由回测请求，解耦 Pod IP 变动。
# 权衡：ClusterIP 仅集群内可达，符合引擎仅供内部调用的设计。
apiVersion: v1
kind: Service
metadata:
  name: rust-engine
  namespace: backtest-platform
  labels:
    app: rust-engine
    app.kubernetes.io/part-of: backtest-platform
spec:
  type: ClusterIP
  selector:
    app: rust-engine
  ports:
    - port: 5002
      targetPort: 5002
      protocol: TCP
