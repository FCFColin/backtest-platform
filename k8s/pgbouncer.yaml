# 企业理由：PostgreSQL 连接创建成本高（TLS 握手+认证约 50ms），
# 100x 流量下 20 连接池快速耗尽。PgBouncer 是轻量级连接池，
# 在应用和 PostgreSQL 之间复用连接，支持数千并发仅用少量 PostgreSQL 连接。
# 权衡：引入 PgBouncer 增加一跳网络延迟（约 0.1ms），但解除连接池瓶颈。
# 事务模式（pool_mode = transaction）确保事务内连接不切换。
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: backtest-platform
  labels:
    app.kubernetes.io/part-of: backtest-platform
data:
  pgbouncer.ini: |
    [databases]
    backtest = host=postgres port=5432 dbname=backtest

    [pgbouncer]
    pool_mode = transaction
    max_client_conn = 200
    default_pool_size = 25
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_idle_timeout = 300
    server_lifetime = 3600
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    log_connections = 0
    log_disconnections = 0
    stats_period = 60
    admin_users = backtest

  userlist.txt: |
    "backtest" "md5XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: backtest-platform
  labels:
    app: pgbouncer
    app.kubernetes.io/part-of: backtest-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.23.0
          ports:
            - containerPort: 5432
          env:
            - name: DB_USER
              value: backtest
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer
          resources:
            requests:
              memory: 32Mi
              cpu: 0.1
            limits:
              memory: 64Mi
              cpu: 0.25
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: backtest-platform
  labels:
    app: pgbouncer
    app.kubernetes.io/part-of: backtest-platform
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
