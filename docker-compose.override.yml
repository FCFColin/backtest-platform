# =============================================================================
# 本地开发端口覆盖
#
# 本机已有原生 Redis(6379) 与 PostgreSQL(5432) 在运行（可能被其他项目占用），
# 为避免端口冲突且不破坏本地系统服务，将 compose 的 redis/postgres 映射到备用端口。
# 应用通过 .env 的 REDIS_URL / DATABASE_URL 指向这些备用端口。
# 仅用于本地开发，可逆：删除本文件并停用本地服务后即可回到标准端口。
#
# 使用 !override 完全替换基础文件的 ports 列表（compose 默认会追加合并）。
# =============================================================================

services:
  postgres:
    ports: !override
      - '127.0.0.1:5442:5432'

  redis:
    ports: !override
      - '127.0.0.1:6380:6379'
